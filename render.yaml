services:
  # 註解：後端 Spring Boot（Web Service）
  - type: web
    name: um-glossary-backend
    # 註解：Render UI 沒看到 Java runtime 時，改用 Docker 最穩定
    runtime: docker
    rootDir: backend
    healthCheckPath: /api/health
    envVars:
      # 註解：把資料與備份放到持久化磁碟（見 disks）
      - key: APP_GLOSSARY_JSON_PATH
        value: /var/data/glossary.json
      - key: APP_BACKUP_DIR
        value: /var/data/backups
    disks:
      - name: glossary-data
        mountPath: /var/data
        sizeGB: 1

  # 註解：前端 Vite（Static Site）
  - type: web
    name: um-glossary-frontend
    runtime: static
    rootDir: frontend
    # 註解：有些 Render 建置流程會在 repo root 執行指令；用 cd 避免找不到 lockfile。
    buildCommand: cd frontend && npm ci && npm run build
    # 註解：同理，publish path 也用 repo root 相對路徑，避免 rootDir 沒生效。
    staticPublishPath: frontend/dist
    envVars:
      # 註解：先用 placeholder；建立 backend 後，把它改成 backend 的公開 URL，例如：
      # https://um-glossary-backend.onrender.com/api
      - key: VITE_API_BASE_URL
        value: REPLACE_ME_BACKEND_URL/api
