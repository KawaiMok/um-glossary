server:
  # 註解：Render 會用 $PORT 指定對外 port，這裡要能吃到環境變數。
  port: ${PORT:8080}

spring:
  datasource:
    # 註解：請在 Render 環境變數設定 DATABASE_URL（Neon 提供的 postgresql://...）
    url: ${DATABASE_URL:}
  sql:
    init:
      mode: always
      # 註解：確保每次啟動至少會建立表（CREATE IF NOT EXISTS 是安全的）。
      platform: postgres
  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 10MB

app:
  data:
    # 註解：Render 檔案系統是 ephemeral；要持久化請掛載 disk，並把路徑指到 mountPath。
    glossary-json-path: ${APP_GLOSSARY_JSON_PATH:data/glossary.json}
    backup-dir: ${APP_BACKUP_DIR:data/backups}
    target-sheet: UM Title
